id: ccfn_smart_download

requirements:
  - name: ecoscope-platform
    version: ">=2.11.3,<3"
    channel: "https://repo.prefix.dev/ecoscope-workflows/"
  - name: ccfn-tasks
    path: "/mnt/c/Users/Michael/Documents/Codex/ecoscope/projects/ccfn/tasks"
    editable: true
  - name: gee-tasks
    path: "/mnt/c/Users/Michael/Documents/Codex/ecoscope/projects/gee/tasks"
    editable: true

task-instance-defaults:
  skipif:
    conditions:
      - any_is_empty_df
      - any_dependency_skipped

workflow:

  # ── Workflow metadata ────────────────────────────────────────────────────
  - name: Workflow Details
    id: workflow_details
    task: set_workflow_details
    partial:
      description: "Download animal observation and patrol effort data from the CCFN SMART Connect server for the selected time range and visualise by conservancy and species."

  # ── Time range ────────────────────────────────────────────────────────────
  - name: Time Range
    id: time_range
    task: set_time_range
    partial:
      time_format: "%d %b %Y %H:%M:%S"

  # ── Download data ─────────────────────────────────────────────────────────
  - name: Animal Observations
    id: observations
    task: download_smart_observations
    partial:
      connection: "ccfn"
      time_range: ${{ workflow.time_range.return }}

  - name: Patrol Effort
    id: patrols
    task: download_smart_patrols
    partial:
      connection: "ccfn"
      time_range: ${{ workflow.time_range.return }}
      min_patrol_km: 5.0

  # ── Conservancy boundary ──────────────────────────────────────────────────
  - name: Conservancy Boundary
    id: conservancy_boundary
    task: estimate_conservancy_boundary
    partial:
      geodataframe: ${{ workflow.patrols.return }}
      buffer_km: 3.0
      hull_percentile: 95.0

  # ── Land cover change analysis ────────────────────────────────────────────
  - name: Land Cover Change Events
    id: lcc_events
    task: get_land_cover_change_events
    partial:
      roi: ${{ workflow.conservancy_boundary.return }}
      time_range: ${{ workflow.time_range.return }}
      change_from_classes: "trees,grass,flooded_vegetation,shrub_and_scrub"
      change_to_classes: "crops,built"
      min_area_ha: 0.1
      max_events: 2000
    skipif:
      conditions:
        - any_dependency_skipped

  - name: Land Cover Change Map
    id: lcc_map
    task: draw_lcc_map
    partial:
      lcc_events: ${{ workflow.lcc_events.return }}
      boundary: ${{ workflow.conservancy_boundary.return }}
      time_range: ${{ workflow.time_range.return }}
    skipif:
      conditions:
        - never

  - name: Land Cover Change Table
    id: lcc_table
    task: draw_lcc_table
    partial:
      lcc_events: ${{ workflow.lcc_events.return }}
      time_range: ${{ workflow.time_range.return }}
    skipif:
      conditions:
        - never

  - name: Total Area Changed (ha)
    id: lcc_total_ha
    task: draw_lcc_stat
    partial:
      lcc_events: ${{ workflow.lcc_events.return }}
      time_range: ${{ workflow.time_range.return }}
    skipif:
      conditions:
        - never

  # ── Observation map ───────────────────────────────────────────────────────
  - name: Animal Observations Map
    id: obs_map
    task: draw_species_map
    partial:
      geodataframe: ${{ workflow.observations.return }}
      boundary: ${{ workflow.conservancy_boundary.return }}
      time_range: ${{ workflow.time_range.return }}
    skipif:
      conditions:
        - never

  # ── Observation chart ─────────────────────────────────────────────────────
  - name: Animal Observations by Month
    id: obs_chart
    task: draw_species_chart
    partial:
      geodataframe: ${{ workflow.observations.return }}
      time_range: ${{ workflow.time_range.return }}
    skipif:
      conditions:
        - never

  # ── Patrol map ────────────────────────────────────────────────────────────
  - name: Patrol Effort Map
    id: patrol_map
    task: draw_patrol_map
    partial:
      geodataframe: ${{ workflow.patrols.return }}
      boundary: ${{ workflow.conservancy_boundary.return }}
      time_range: ${{ workflow.time_range.return }}
    skipif:
      conditions:
        - never

  # ── Patrol chart ──────────────────────────────────────────────────────────
  - name: Patrol Effort by Month
    id: patrol_chart
    task: draw_patrol_chart
    partial:
      geodataframe: ${{ workflow.patrols.return }}
      time_range: ${{ workflow.time_range.return }}
    skipif:
      conditions:
        - never

  # ── Persist HTML to files ──────────────────────────────────────────────────
  - name: Observation Map HTML
    id: obs_map_html
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.obs_map.return }}

  - name: Observation Chart HTML
    id: obs_chart_html
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.obs_chart.return }}

  - name: Patrol Map HTML
    id: patrol_map_html
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.patrol_map.return }}

  - name: Patrol Chart HTML
    id: patrol_chart_html
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.patrol_chart.return }}

  - name: Land Cover Change Map HTML
    id: lcc_map_html
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.lcc_map.return }}

  - name: Land Cover Change Table HTML
    id: lcc_table_html
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.lcc_table.return }}

  - name: Total Area Changed HTML
    id: lcc_stat_html
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.lcc_total_ha.return }}

  # ── Widgets ───────────────────────────────────────────────────────────────
  - name: Observation Map Widget
    id: obs_map_widget
    task: create_map_widget_single_view
    partial:
      title: "Animal Observations Map"
      view: null
      data: ${{ workflow.obs_map_html.return }}
    skipif:
      conditions:
        - never

  - name: Observation Chart Widget
    id: obs_chart_widget
    task: create_plot_widget_single_view
    partial:
      title: "Animal Observations by Month"
      view: null
      data: ${{ workflow.obs_chart_html.return }}
    skipif:
      conditions:
        - never

  - name: Patrol Map Widget
    id: patrol_map_widget
    task: create_map_widget_single_view
    partial:
      title: "Patrol Effort Map"
      view: null
      data: ${{ workflow.patrol_map_html.return }}
    skipif:
      conditions:
        - never

  - name: Patrol Chart Widget
    id: patrol_chart_widget
    task: create_plot_widget_single_view
    partial:
      title: "Patrol Effort by Month"
      view: null
      data: ${{ workflow.patrol_chart_html.return }}
    skipif:
      conditions:
        - never

  - name: Land Cover Change Map Widget
    id: lcc_map_widget
    task: create_map_widget_single_view
    partial:
      title: "Land Cover Change Map"
      view: null
      data: ${{ workflow.lcc_map_html.return }}
    skipif:
      conditions:
        - never

  - name: Land Cover Change Table Widget
    id: lcc_table_widget
    task: create_table_widget_single_view
    partial:
      title: "Land Cover Change Events"
      view: null
      data: ${{ workflow.lcc_table_html.return }}
    skipif:
      conditions:
        - never

  - name: Total Area Changed Widget
    id: lcc_total_ha_widget
    task: create_plot_widget_single_view
    partial:
      title: "Total Area Changed (ha)"
      view: null
      data: ${{ workflow.lcc_stat_html.return }}
    skipif:
      conditions:
        - never

  # ── Dashboard ─────────────────────────────────────────────────────────────
  - name: Dashboard
    id: dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return }}
      widgets:
        - ${{ workflow.obs_map_widget.return }}
        - ${{ workflow.obs_chart_widget.return }}
        - ${{ workflow.patrol_map_widget.return }}
        - ${{ workflow.patrol_chart_widget.return }}
        - ${{ workflow.lcc_map_widget.return }}
        - ${{ workflow.lcc_table_widget.return }}
        - ${{ workflow.lcc_total_ha_widget.return }}
      groupers:
        - index_name: "All"
      time_range: ${{ workflow.time_range.return }}
    skipif:
      conditions:
        - never
