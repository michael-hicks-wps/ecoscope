openapi: 3.0.1
info:
  title: SMART Connect API
  description: SMART Connect API
  version: "7.0"
servers:
- url: https://<connectserver>/connect/api/
  variables: {}
paths:
  /api/basemap:
    get:
      description: Lists all SMART desktop basemap layers for Conservation Areas the
        current user can access.
      operationId: getLayers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlertType'
    put:
      description: Updates the set of basemaps to be visible by default for the current
        user
      operationId: updateLayerSet
      requestBody:
        content:
          '*/*':
            schema:
              type: array
              items:
                type: string
      responses:
        "200":
          description: OK
  /api/basemap/{tileset}/{z}/{x}/{y}:
    get:
      operationId: getTile
      parameters:
      - name: tileset
        in: path
        description: The tileset
        required: true
        schema:
          type: string
      - name: z
        in: path
        description: z
        required: true
        schema:
          type: string
      - name: x
        in: path
        description: x
        required: true
        schema:
          type: string
      - name: "y"
        in: path
        description: "y"
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
  /api/ca/datamodel:
    post:
      operationId: updateFilePost
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MultipartFormDataInput'
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /api/connectalert:
    get:
      description: Get a filtered Alert List as GeoJSON
      operationId: getAllAlerts
      parameters:
      - name: levelFilter
        in: query
        schema:
          type: string
      - name: typeUuidFilter
        in: query
        schema:
          type: string
      - name: statusFilter
        in: query
        schema:
          type: string
      - name: caUuidFilter
        in: query
        schema:
          type: string
      - name: startDateFilter
        in: query
        schema:
          type: string
      - name: endDateFilter
        in: query
        schema:
          type: string
      - name: textSearchFilter
        in: query
        schema:
          type: string
      - name: sortBy
        in: query
        schema:
          type: string
      - name: sortAscending
        in: query
        schema:
          type: boolean
      - name: maxAlertOverride
        in: query
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                type: string
  /api/connectalert/alertTypes:
    get:
      description: Lists all alert types configured in SMART Connect
      operationId: getAlertTypes
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlertType'
  /api/connectalert/alertTypes/{label}:
    post:
      description: Creates a new alert type
      operationId: addAlertType
      parameters:
      - name: label
        in: path
        description: The name for the new alert type
        required: true
        schema:
          type: string
      requestBody:
        description: Details of the new alert type. Uuid field is ignored
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertType'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertType'
  /api/connectalert/alertTypes/{uuid}:
    get:
      description: Gets details for the given alert type
      operationId: getAlertType
      parameters:
      - name: uuid
        in: path
        description: unique identifier for alert type
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertType'
    put:
      description: Updates an alert type.
      operationId: updateAlertType
      parameters:
      - name: uuid
        in: path
        description: unique system identifier for the alert type to update
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        description: New details for the alert type.  Only populate attributes to
          be updated. Attributes not provided will not be updated.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertType'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertType'
    delete:
      description: Deletes the provided alert type
      operationId: removeAlertType
      parameters:
      - name: uuid
        in: path
        description: unique system identifier of alert type to delete
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertType'
  /api/connectalert/ca/{caUuid}:
    get:
      description: Get all alert for a given Conservation Area.
      operationId: getAlertsByCa
      parameters:
      - name: caUuid
        in: path
        description: unique system identifier of the Conservation Area
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Alert'
  /api/connectalert/{alertUuid}:
    get:
      description: Get a specific alert
      operationId: getAlert
      parameters:
      - name: alertUuid
        in: path
        description: the unique system identifier of the alert to return
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
    delete:
      description: Deletes an alert
      operationId: removeAlert
      parameters:
      - name: alertUuid
        in: path
        description: system generated unique identifer of the alert to delete
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
  /api/connectalert/{usergenid}:
    put:
      description: Updates a given alert
      operationId: editAlert
      parameters:
      - name: usergenid
        in: path
        description: User generated unique identifier of the alert to update.
        required: true
        schema:
          type: string
      requestBody:
        description: New values for alert.  Attributes that are not going to be updated
          can be left out.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Alert'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
    post:
      description: "Create a new Alert.  Note on Tracks / Updates: If you call this\
        \ API with the same usergenid more than once, the systems adds the past x,y\
        \ coordinates \r\n to a historical \"track\" of sorts and overwrites the other\
        \ attributes with the latest data. This is the way users can send a repetitive\r\
        \n \"ping\" to keep a last-known location and past track of devices without\
        \ creating a new alert everytime the location is updated. "
      operationId: addAlert
      parameters:
      - name: usergenid
        in: path
        description: user generated identifier for alert
        required: true
        schema:
          type: string
      requestBody:
        description: Details of the alert. "Date" is option and if left blank will
          be populated by the server.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeoJsonAlert'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
  /api/connectalertfilterdefault:
    get:
      operationId: getAlertFilterDefaults
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlertFilterDefault'
    put:
      operationId: updateAlertFilterDefault
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertFilterDefault'
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertFilterDefault'
  /api/connectalertfilterdefault/{uuid}:
    put:
      operationId: updateAlertFilterDefault_1
      parameters:
      - name: uuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertFilterDefault'
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertFilterDefault'
  /api/connectstyle:
    get:
      operationId: getStyleConfiguration
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StyleConfiguration'
    put:
      operationId: editStyleConfiguration
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MultipartFormDataInput'
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StyleConfiguration'
    post:
      operationId: addStyleConfiguration
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MultipartFormDataInput'
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StyleConfiguration'
    delete:
      operationId: removeStyleConfiguration
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StyleConfiguration'
  /api/connectuser:
    get:
      description: Get all active Connect users.
      operationId: getActiveUsers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SmartUser'
  /api/connectuser/activate/{username}:
    put:
      description: Activate an inactive user.
      operationId: activateUser
      parameters:
      - name: username
        in: path
        description: the username to activate
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmartUser'
    delete:
      description: Deactivate a user.
      operationId: deactivateUser
      parameters:
      - name: username
        in: path
        description: the username to deactivate
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmartUser'
  /api/connectuser/getCurrent:
    get:
      description: Get the detailed information about the current user.
      operationId: getCurrentUser
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmartUser'
  /api/connectuser/getinactive:
    get:
      description: Gets all inactive users.
      operationId: getInactiveUsers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SmartUser'
  /api/connectuser/iscurrentuseradmin:
    get:
      description: Returns whether the current user is an admin user or not.
      operationId: isCurrentUserAnAdmin
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: boolean
  /api/connectuser/{username}:
    get:
      description: Get a users details.
      operationId: getUser
      parameters:
      - name: username
        in: path
        description: the username of the requested user
        required: true
        schema:
          type: string
      - name: validate
        in: query
        description: "optional, set to true if you only want to validate this user\
          \ and not get their full details back"
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmartUser'
    put:
      description: Update a user's details
      operationId: updateUser
      parameters:
      - name: username
        in: path
        description: the username of the requested user
        required: true
        schema:
          type: string
      requestBody:
        description: The new values for the user details.  Only non-null attributes
          are updated.  Use a value of 99999999-9999-9999-9999-999999999999 to update
          the home Conservation Area to null.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmartUser'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmartUser'
    post:
      description: Create a new user.
      operationId: addUser
      parameters:
      - name: username
        in: path
        description: the username of the user
        required: true
        schema:
          type: string
      requestBody:
        description: other details about the user
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmartUser'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmartUser'
    delete:
      description: Deletes a user.
      operationId: removeUser_1
      parameters:
      - name: username
        in: path
        description: the username to delete
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmartUser'
  /api/conservationarea:
    get:
      description: Lists all Conservation Areas
      operationId: getConservationAreas
      parameters:
      - name: organizationFilter
        in: query
        description: optional - only return CAs that have the provided text in the
          organization field
        schema:
          type: string
      - name: caJsonFilter
        in: query
        description: "optional - must be valid GeoJson polygon - only return CAs that\
          \ are completely contained within this GeoJSON Polygon. ie. if a single\
          \ point of the CA Boundary is outside of it, the ca will not be returned.\
          \ be sure to encode the geojson, leave no spaces etc. An example of a simple\
          \ polygon of the world:  caJsonFilter=%7B%22type%22%3A%22Polygon%22%2C%22coordinates%22%3A%5B%5B%5B-180%2C90%5D%2C%5B180%2C90%5D%2C%5B180%2C-90%5D%2C%5B-180%2C-90%5D%2C%5B-180%2C90%5D%5D%5D%7D\
          \   originally it is caJsonFilter={'type':'Polygon','coordinates':[[[-180,90],[180,90],[180,-90],[-180,-90],[-180,90]]]}\
          \  use you local programming language urlencoder, or an online tool like\
          \ this to do it out manually: http://meyerweb.com/eric/tools/dencoder/"
        schema:
          type: string
      - name: includeSpatialBoundaries
        in: query
        description: "Boolean - true to get GeoJson data on CA boundaries, false to\
          \ skip it as this can take a long time for lots of CAs and lots of boundaries."
        schema:
          type: boolean
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConservationAreaProxy'
    post:
      description: Creates a new conservation area with no data.  Both parameters
        are optional and generated by the system if not provided.
      operationId: createConservationArea
      parameters:
      - name: cauuid
        in: query
        description: "The CA UUID you wish to create, leave it blank if you want the\
          \ system to create one for you."
        schema:
          type: string
      - name: name
        in: query
        description: The CA Name
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            application/json: {}
  /api/conservationarea/withdataonly:
    get:
      description: List all Conservation Areas that have SMART data
      operationId: getConservationAreasWithData
      parameters:
      - name: permission
        in: query
        description: Optional. If provided it should be a comma delimited list of
          action strings that are applicable for the Conservation Area. Only Conservation
          Areas that the user has the specific action permission for will be returned.
          For example permission=updateca will only return ca's that the user has
          permission to update. If not provided only ca's the user has permission
          to read from are returned.
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConservationAreaProxy'
  /api/conservationarea/{cauuid}:
    get:
      description: "This function returns different information depending on parameters\r\
        \n\t * provided:\r\n\t *  <ul><li>If no parameters are provided it returns\
        \ a JSON object\r\n\t * with information about the conservation area.</li>\
        \  \r\n\t * <li>If data, version, and revision\r\n\t * are provided with a\
        \ value of \"changelog\" for data then a zip file is\r\n\t * returned containing\
        \ the change log.  In data is provided with a value of \r\n\t * \"all\" then\
        \ a url is returned that represents the status of the ca download\r\n\t *\
        \ package process.</li>\r\n\t * </ul>\r\n\t * </p>"
      operationId: getConservationArea
      parameters:
      - name: cauuid
        in: path
        description: the CA UUID
        required: true
        schema:
          type: string
      - name: data
        in: query
        description: the data
        schema:
          type: string
      - name: version
        in: query
        description: version number
        schema:
          type: string
      - name: revision
        in: query
        description: revision number
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            application/json: {}
    put:
      description: Initiates an upload CA session
      operationId: updateConservationArea
      parameters:
      - name: cauuid
        in: path
        description: the Conservation Area UUID as a string
        required: true
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                type: string
    post:
      description: Initiates an upload CA session. Used when uploading a full CA from
        SMART Desktop
      operationId: createAndUploadConservationArea
      parameters:
      - name: cauuid
        in: path
        description: The Conservation Area uuid
        required: true
        schema:
          type: string
      - name: version
        in: query
        description: the Conservation Area uuid version number as a string
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                type: string
    delete:
      description: Deletes a given Conservation Area.
      operationId: deleteConservationArea
      parameters:
      - name: cauuid
        in: path
        description: the UUID of the CA you wish to delete
        required: true
        schema:
          type: string
      - name: dataonly
        in: query
        description: "Strings 'true' or 'false' indicate if you want to delete the\
          \ desktop data only, not the alerts and other Connect-based data"
        schema:
          type: string
      - name: username
        in: query
        description: must be a valid admin username
        schema:
          type: string
      - name: password
        in: query
        description: the admin password
        schema:
          type: string
      - name: version
        in: query
        description: "a valid UUID formatted string, this can be retrieved from the\
          \ getCAs call, you get something like: version=008ffc5a-7228-4d9c-a342-5dbf1fbec21e"
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            application/json: {}
  /api/cybertracker/apikey:
    get:
      operationId: getApiKeys
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConservationAreaInfo'
  /api/cybertracker/apikey/{uuid}:
    get:
      operationId: getApiKey
      parameters:
      - name: uuid
        in: path
        required: true
        schema:
          type: string
      - name: type
        in: query
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            '*/*':
              schema:
                type: string
    delete:
      operationId: deleteApiKey
      parameters:
      - name: uuid
        in: path
        required: true
        schema:
          type: string
      - name: type
        in: query
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            '*/*':
              schema:
                type: boolean
  /api/cybertracker/navigationlayers:
    get:
      operationId: getNavigationLayers
      parameters:
      - name: cauuid
        in: query
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CyberTrackerNavigationProxy'
  /api/cybertracker/navigationlayers/{uuid}:
    get:
      operationId: getNavigationLayer
      parameters:
      - name: uuid
        in: path
        required: true
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            '*/*': {}
    post:
      operationId: createNavigationLayer
      parameters:
      - name: uuid
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CyberTrackerNavigationProxy'
      responses:
        default:
          description: default response
          content:
            '*/*':
              schema:
                type: string
    delete:
      operationId: deleteNavigation
      parameters:
      - name: uuid
        in: path
        required: true
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            '*/*': {}
  /api/cybertracker/packages:
    get:
      operationId: getPackages
      parameters:
      - name: cauuid
        in: query
        schema:
          type: string
      - name: private
        in: query
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CyberTrackerPackageProxy'
  /api/cybertracker/packages/info/{uuid}:
    get:
      operationId: getPackage
      parameters:
      - name: uuid
        in: path
        required: true
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CyberTrackerPackageProxy'
  /api/cybertracker/packages/{uuid}:
    get:
      operationId: getCtPackage
      parameters:
      - name: uuid
        in: path
        required: true
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            '*/*': {}
    post:
      operationId: createPackage
      parameters:
      - name: uuid
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CyberTrackerPackageProxy'
      responses:
        default:
          description: default response
          content:
            '*/*':
              schema:
                type: string
    delete:
      operationId: deletePackage
      parameters:
      - name: uuid
        in: path
        required: true
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            '*/*': {}
  /api/dashboardbeta:
    get:
      operationId: getAllDashboards
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dashboard'
    post:
      operationId: addOrUpdateDashboard
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Dashboard'
      responses:
        default:
          description: default response
