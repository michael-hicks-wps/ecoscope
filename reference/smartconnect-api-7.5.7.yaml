  /api/query/{queryuuid}:
    get:
      description: Runs a query and returns the results.
      operationId: getQueryResults
      parameters:
      - name: queryuuid
        in: path
        description: the uuid of the query requested
        required: true
        schema:
          type: string
      - name: format
        in: query
        description: "requested format, not all options makes sense for all query\
          \ types: csv, shp, html, tif, geojson"
        schema:
          type: string
      - name: start_date
        in: query
        description: "start date of query, in the form yyyy-MM-dd"
        schema:
          type: string
      - name: end_date
        in: query
        description: "end date of query, in the form yyyy-MM-dd"
        schema:
          type: string
      - name: date_filter
        in: query
        description: "date field type, not all make sense for all queries: waypointdate,\
          \ patrolstart, patrolend, missiontrackdate, missionstartdate, missionenddate,\
          \ intellreceiveddate"
        schema:
          type: string
      - name: delimiter
        in: query
        description: delimiter override to use in CSV format
        schema:
          type: string
      - name: cafilter
        in: query
        description: "provided as a comma separated list of CA uuids, only runs the\
          \ query against these CAs."
        schema:
          type: string
      - name: sortcolumn
        in: query
        description: "the attribute key of the column you wish to sort by. It is tricky\
          \ to know what columns are valid here as the queries are all very dynamic\
          \ and there are many type. eg, &sortcolumn=wp_id \r\n\t * \t\t\t\t\t\tfor\
          \ details of valid columns see here:  https://app.assembla.com/spaces/smart-cs/wiki/SMART_Connect_Query_Sorting_Fields\
          \  "
        schema:
          type: string
      - name: sortdirection
        in: query
        description: "set this to \"descending\" (or \"desc\") to get reverse order,\
          \ otherwise you will get ascending order by default.  eg: &sortdirection=descending\
          \ \r\n\t * \t\t\tThis parameter will be ignored if provided without a sortcolumn."
        schema:
          type: string
      - name: srid
        in: query
        description: "the requested output projection SRID. The default is 4326 (WGS84,\
          \ standard Lat/long coordinates). This parameter is ignored if the 'format'\
          \ is not geojson or shp. (Note: for google map's projection you must use\
          \ the official srid of 3857, 900913 doesn't work."
        schema:
          type: string
      - name: includeuuids
        in: query
        description: "optional; if \"true\" then the observation uuid, waypoint uuid\
          \ and conservation area uuid are include in the results if appropriate for\
          \ the query type; for summary queries that include a group by Conservation\
          \ Area column, the value for the Conservation Area will be the uuid instead\
          \ of the name/id when includeuuids is true"
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            '*/*': {}
